<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>verify measurement dashboard</title>
<style>
:root {
    --bg: #f6f3ee;
    --panel: #fffdf8;
    --panel-2: #f0e7d8;
    --line: #d8ccb8;
    --text: #1f1d1a;
    --muted: #685f54;
    --ok: #1a7f45;
    --bad: #b42318;
    --warn: #b7791f;
    --accent: #9a3412;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: "Iosevka Web", "IBM Plex Sans JP", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, #f0d9b5 0, transparent 35%),
        linear-gradient(180deg, #f9f5ed 0%, var(--bg) 100%);
}
main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 20px 80px;
}
h1 {
    margin: 0;
    font-size: clamp(28px, 5vw, 48px);
    line-height: 1.05;
    letter-spacing: -0.03em;
}
.lede {
    margin: 10px 0 0;
    color: var(--muted);
}
.meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 22px 0 28px;
}
.chip {
    border: 1px solid var(--line);
    background: rgba(255, 253, 248, 0.75);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 14px;
}
.controls {
    display: grid;
    grid-template-columns: minmax(240px, 1fr) auto auto;
    gap: 12px;
    margin-bottom: 18px;
}
.controls input,
.controls select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    background: var(--panel);
    color: var(--text);
}
.table-wrap {
    border: 1px solid var(--line);
    border-radius: 22px;
    overflow-x: auto;
    overflow-y: hidden;
    background: rgba(255, 253, 248, 0.9);
    box-shadow: 0 16px 40px rgba(76, 52, 24, 0.08);
}
table {
    width: 100%;
    min-width: 1120px;
    border-collapse: collapse;
    table-layout: fixed;
}
thead {
    background: var(--panel-2);
}
th, td {
    padding: 12px 14px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
}
th button {
    border: 0;
    background: transparent;
    font: inherit;
    color: inherit;
    padding: 0;
    cursor: pointer;
}
tbody tr:hover {
    background: rgba(154, 52, 18, 0.04);
}
.path {
    font-family: "Iosevka Web", "SFMono-Regular", monospace;
    font-size: 13px;
    overflow-wrap: anywhere;
}
.muted {
    color: var(--muted);
    overflow-wrap: anywhere;
}
.status-ok { color: var(--ok); font-weight: 700; }
.status-bad { color: var(--bad); font-weight: 700; }
.status-warn { color: var(--warn); font-weight: 700; }
.bar {
    width: 160px;
    height: 10px;
    background: #eadfce;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
}
.bar > span {
    display: block;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #d97706, var(--accent));
}
details {
    margin: 0;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(240, 231, 216, 0.45);
}
summary {
    display: block;
    cursor: pointer;
    color: var(--accent);
    font-weight: 700;
    padding: 10px 12px;
}
.detail-stack {
    display: grid;
    gap: 10px;
    min-width: 0;
}
.detail-meta {
    margin-bottom: 2px;
}
.detail-body {
    padding: 0 12px 12px;
}
.detail-body > :first-child {
    margin-top: 0;
}
.detail-body > :last-child {
    margin-bottom: 0;
}
.case-table {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255, 253, 248, 0.88);
    table-layout: auto;
}
.case-table th,
.case-table td {
    padding: 8px 10px;
    font-size: 13px;
}
pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #201d18;
    color: #f8f3ea;
    padding: 12px 14px;
    border-radius: 14px;
    overflow: auto;
}
.dashboard-table > thead > tr > th:nth-child(1),
.dashboard-table > tbody > tr > td:nth-child(1) {
    width: 28%;
}
.dashboard-table > thead > tr > th:nth-child(2),
.dashboard-table > tbody > tr > td:nth-child(2) {
    width: 10%;
}
.dashboard-table > thead > tr > th:nth-child(3),
.dashboard-table > tbody > tr > td:nth-child(3),
.dashboard-table > thead > tr > th:nth-child(4),
.dashboard-table > tbody > tr > td:nth-child(4),
.dashboard-table > thead > tr > th:nth-child(5),
.dashboard-table > tbody > tr > td:nth-child(5),
.dashboard-table > thead > tr > th:nth-child(6),
.dashboard-table > tbody > tr > td:nth-child(6) {
    width: 11%;
}
.dashboard-table > thead > tr > th:nth-child(7),
.dashboard-table > tbody > tr > td:nth-child(7) {
    width: 29%;
}
@media (max-width: 860px) {
    main {
        padding-inline: 14px;
    }
    .controls {
        grid-template-columns: 1fr;
    }
    .bar {
        width: 120px;
    }
}
</style>
</head>
<body>
<main>
    <h1>Verify Measurement Dashboard</h1>
    <p class="lede">`oj test` を再実行しながら JSON を逐次更新し、テストごとの最遅ケースとケース別実行時間を一覧する。</p>
    <div class="meta">
        <div class="chip" id="summary-generated">generated: 2026-03-12T21:34:35+09:00</div>
        <div class="chip" id="summary-total"></div>
        <div class="chip" id="summary-progress"></div>
        <div class="chip" id="summary-failed"></div>
    </div>
    <div class="controls">
        <input id="filter" type="search" placeholder="test path / url で絞り込み">
        <select id="status-filter">
            <option value="all">all</option>
            <option value="ok">ok only</option>
            <option value="failed">failed only</option>
        </select>
        <select id="sort-key">
            <option value="slowestSec">sort: slowest</option>
            <option value="averageSec">sort: average</option>
            <option value="compileWallSec">sort: compile</option>
            <option value="path">sort: path</option>
        </select>
    </div>
    <div class="table-wrap">
        <table class="dashboard-table">
            <thead>
                <tr>
                    <th><button data-sort="path">test</button></th>
                    <th><button data-sort="status">status</button></th>
                    <th><button data-sort="compileWallSec">compile</button></th>
                    <th><button data-sort="slowestSec">slowest</button></th>
                    <th><button data-sort="averageSec">average</button></th>
                    <th><button data-sort="maxMemoryMb">memory</button></th>
                    <th>details</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</main>
<script>
const jsonUrl = "measure-dashboard.json";
let report = {"generatedAt": "2026-03-12T21:34:35+09:00", "root": "/home/firiexp/library", "testCount": 4, "summary": {"pending": 0, "running": 0, "done": 1, "error": 3, "ok": 1, "failed": 3}, "tests": [{"path": "test/yosupo_unionfind.test.cpp", "phase": "error", "problem": null, "compiler": {"command": [], "wallSec": null}, "testcases": {"directory": null, "cachedCaseCount": 0}, "run": {"command": [], "returnCode": null, "wallSec": null, "ok": false, "parsed": {"cases": [], "caseCount": 0, "timedCaseCount": 0, "passedCaseCount": 0, "slowestSec": null, "slowestCase": null, "averageSec": null, "maxMemoryMb": null, "maxMemoryCase": null, "summary": null}, "output": "Command '['git', '-C', '/home/firiexp/.cache/online-judge-tools/library-checker-problems', 'pull']' returned non-zero exit status 1."}}, {"path": "test/yosupo_aplusb_functional_graph.test.cpp", "phase": "error", "problem": null, "compiler": {"command": [], "wallSec": null}, "testcases": {"directory": null, "cachedCaseCount": 0}, "run": {"command": [], "returnCode": null, "wallSec": null, "ok": false, "parsed": {"cases": [], "caseCount": 0, "timedCaseCount": 0, "passedCaseCount": 0, "slowestSec": null, "slowestCase": null, "averageSec": null, "maxMemoryMb": null, "maxMemoryCase": null, "summary": null}, "output": "Command '['git', '-C', '/home/firiexp/.cache/online-judge-tools/library-checker-problems', 'pull']' returned non-zero exit status 1."}}, {"path": "test/yosupo_zalgorithm.test.cpp", "phase": "error", "problem": null, "compiler": {"command": [], "wallSec": null}, "testcases": {"directory": null, "cachedCaseCount": 0}, "run": {"command": [], "returnCode": null, "wallSec": null, "ok": false, "parsed": {"cases": [], "caseCount": 0, "timedCaseCount": 0, "passedCaseCount": 0, "slowestSec": null, "slowestCase": null, "averageSec": null, "maxMemoryMb": null, "maxMemoryCase": null, "summary": null}, "output": "Command '['git', '-C', '/home/firiexp/.cache/online-judge-tools/library-checker-problems', 'pull']' returned non-zero exit status 1."}}, {"path": "test/aoj0273.test.cpp", "phase": "done", "problem": "http://judge.u-aizu.ac.jp/onlinejudge/description.jsp?id=0273", "compiler": {"command": ["g++", "--std=c++17", "-O2", "-Wall", "-g", "-I", "/home/firiexp/library", "-o", "a.out", "test/aoj0273.test.cpp"], "wallSec": 1.470692597999971}, "testcases": {"directory": ".verify-helper/cache/7e61ca263de0f7a6c87d9b9588c9286e/test", "cachedCaseCount": 8}, "run": {"command": ["oj", "test", "-c", "/home/firiexp/library/.verify-helper/cache/7e61ca263de0f7a6c87d9b9588c9286e/verify-dashboard-ayxhiyx5/a.out", "-d", "/home/firiexp/library/.verify-helper/cache/7e61ca263de0f7a6c87d9b9588c9286e/test", "--tle", "60.0"], "returnCode": 0, "wallSec": 0.22508096899997554, "ok": true, "parsed": {"cases": [{"name": "testcase_00", "timeSec": 0.003399, "status": "AC"}, {"name": "testcase_01", "timeSec": 0.002607, "status": "AC"}, {"name": "testcase_02", "timeSec": 0.00324, "status": "AC"}, {"name": "testcase_03", "timeSec": 0.002631, "status": "AC"}, {"name": "testcase_04", "timeSec": 0.002595, "status": "AC"}, {"name": "testcase_05", "timeSec": 0.002477, "status": "AC"}, {"name": "testcase_06", "timeSec": 0.002809, "status": "AC"}, {"name": "testcase_07", "timeSec": 0.005925, "status": "AC"}], "caseCount": 8, "timedCaseCount": 8, "passedCaseCount": 8, "slowestSec": 0.005925, "slowestCase": "testcase_07", "averageSec": 0.003210375, "maxMemoryMb": 4.224, "maxMemoryCase": "testcase_00", "summary": "test success: 8 cases"}, "output": "[INFO] online-judge-tools 11.5.1 (+ online-judge-api-client 10.10.1)\n[INFO] 8 cases found\n\n[INFO] testcase_00\n[INFO] time: 0.003399 sec\n[SUCCESS] AC\n\n[INFO] testcase_01\n[INFO] time: 0.002607 sec\n[SUCCESS] AC\n\n[INFO] testcase_02\n[INFO] time: 0.003240 sec\n[SUCCESS] AC\n\n[INFO] testcase_03\n[INFO] time: 0.002631 sec\n[SUCCESS] AC\n\n[INFO] testcase_04\n[INFO] time: 0.002595 sec\n[SUCCESS] AC\n\n[INFO] testcase_05\n[INFO] time: 0.002477 sec\n[SUCCESS] AC\n\n[INFO] testcase_06\n[INFO] time: 0.002809 sec\n[SUCCESS] AC\n\n[INFO] testcase_07\n[INFO] time: 0.005925 sec\n[SUCCESS] AC\n\n[INFO] slowest: 0.005925 sec  (for testcase_07)\n[INFO] max memory: 4.224000 MB  (for testcase_00)\n[SUCCESS] test success: 8 cases\n"}}]};
const rows = document.getElementById("rows");
const filterInput = document.getElementById("filter");
const statusFilter = document.getElementById("status-filter");
const sortKey = document.getElementById("sort-key");
const summaryGenerated = document.getElementById("summary-generated");
const summaryTotal = document.getElementById("summary-total");
const summaryProgress = document.getElementById("summary-progress");
const summaryFailed = document.getElementById("summary-failed");
let currentSort = "slowestSec";
const openDetails = new Map();

function fmtSec(value) {
    return value == null ? "-" : `${value.toFixed(6)} s`;
}

function fmtMb(value) {
    return value == null ? "-" : `${value.toFixed(3)} MB`;
}

function esc(value) {
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
}

function statusClass(entry) {
    if (entry.phase === "running" || entry.phase === "pending") return "status-warn";
    if (entry.phase === "error") return "status-bad";
    if (entry.run.ok) return "status-ok";
    if (entry.run.parsed.caseCount > 0) return "status-warn";
    return "status-bad";
}

function statusLabel(entry) {
    if (entry.phase === "pending") return "PENDING";
    if (entry.phase === "running") return "RUNNING";
    if (entry.phase === "error") return "ERROR";
    if (entry.run.ok) return "OK";
    if (entry.run.parsed.caseCount > 0) return "FAILED";
    return "ERROR";
}

function normalized(entry, key) {
    if (key === "path") return entry.path;
    if (key === "status") return statusLabel(entry);
    if (key === "compileWallSec") return entry.compiler.wallSec ?? -1;
    if (key === "slowestSec") return entry.run.parsed.slowestSec ?? -1;
    if (key === "averageSec") return entry.run.parsed.averageSec ?? -1;
    if (key === "maxMemoryMb") return entry.run.parsed.maxMemoryMb ?? -1;
    return -1;
}

function buildCaseTable(entry) {
    const cases = entry.run.parsed.cases;
    if (!cases.length) return "<div class=\"muted\">case detail is unavailable</div>";
    return `
        <table class="case-table">
            <thead>
                <tr><th>case</th><th>time</th><th>status</th></tr>
            </thead>
            <tbody>
                ${cases.map((testcase) => `
                    <tr>
                        <td class="path">${esc(testcase.name)}</td>
                        <td>${fmtSec(testcase.timeSec ?? null)}</td>
                        <td>${esc(testcase.status ?? "-")}</td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
    `;
}

function detailStateKey(path, kind) {
    return `${path}::${kind}`;
}

function rememberOpenDetails() {
    rows.querySelectorAll("details[data-entry-path][data-detail-kind]").forEach((detail) => {
        openDetails.set(detailStateKey(detail.dataset.entryPath, detail.dataset.detailKind), detail.open);
    });
}

function detailOpenAttr(path, kind) {
    return openDetails.get(detailStateKey(path, kind)) ? " open" : "";
}

function bindDetailState() {
    rows.querySelectorAll("details[data-entry-path][data-detail-kind]").forEach((detail) => {
        detail.addEventListener("toggle", () => {
            openDetails.set(detailStateKey(detail.dataset.entryPath, detail.dataset.detailKind), detail.open);
        });
    });
}

function render() {
    rememberOpenDetails();
    const query = filterInput.value.trim().toLowerCase();
    const filtered = report.tests
        .filter((entry) => {
            const haystack = `${entry.path} ${entry.problem}`.toLowerCase();
            if (query && !haystack.includes(query)) return false;
            if (statusFilter.value === "ok" && !entry.run.ok) return false;
            if (statusFilter.value === "failed" && entry.run.ok) return false;
            return true;
        })
        .sort((lhs, rhs) => {
            const a = normalized(lhs, currentSort);
            const b = normalized(rhs, currentSort);
            if (typeof a === "string" || typeof b === "string") {
                return String(a).localeCompare(String(b));
            }
            return b - a;
        });

    const peak = Math.max(0.000001, ...filtered.map((entry) => entry.run.parsed.slowestSec ?? 0));
    rows.innerHTML = filtered.map((entry) => {
        const slowest = entry.run.parsed.slowestSec;
        const barWidth = slowest == null ? 0 : (slowest / peak) * 100;
        return `
            <tr>
                <td>
                    <div class="path">${esc(entry.path)}</div>
                    <div class="muted">${esc(entry.problem)}</div>
                </td>
                <td><span class="${statusClass(entry)}">${statusLabel(entry)}</span></td>
                <td>${fmtSec(entry.compiler.wallSec)}</td>
                <td>
                    <div>${fmtSec(slowest)}</div>
                    <div class="bar"><span style="width:${barWidth}%"></span></div>
                </td>
                <td>${fmtSec(entry.run.parsed.averageSec)}</td>
                <td>${fmtMb(entry.run.parsed.maxMemoryMb)}</td>
                <td>
                    <div class="detail-stack">
                        <div class="muted detail-meta">${entry.run.parsed.caseCount} cases / cached ${entry.testcases.cachedCaseCount}</div>
                        <details data-entry-path="${esc(entry.path)}" data-detail-kind="case"${detailOpenAttr(entry.path, "case")}>
                            <summary>case detail</summary>
                            <div class="detail-body">${buildCaseTable(entry)}</div>
                        </details>
                        <details data-entry-path="${esc(entry.path)}" data-detail-kind="raw"${detailOpenAttr(entry.path, "raw")}>
                            <summary>raw log</summary>
                            <div class="detail-body">
                                <pre>${esc(entry.run.output)}</pre>
                            </div>
                        </details>
                    </div>
                </td>
            </tr>
        `;
    }).join("");

    const summary = report.summary ?? {};
    const failed = summary.failed ?? report.tests.filter((entry) => !entry.run.ok && entry.phase !== "pending" && entry.phase !== "running").length;
    summaryGenerated.textContent = `generated: ${report.generatedAt}`;
    summaryTotal.textContent = `tests: ${report.tests.length}`;
    summaryProgress.textContent = `done: ${summary.done ?? 0} / running: ${summary.running ?? 0} / pending: ${summary.pending ?? 0}`;
    summaryFailed.textContent = `failed: ${failed}`;
    bindDetailState();
}

let refreshLock = false;
async function refreshReport() {
    if (refreshLock) return;
    refreshLock = true;
    try {
        const response = await fetch(`${jsonUrl}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return;
        report = await response.json();
        render();
    } catch (_error) {
    } finally {
        refreshLock = false;
    }
}

document.querySelectorAll("[data-sort]").forEach((button) => {
    button.addEventListener("click", () => {
        currentSort = button.dataset.sort;
        sortKey.value = currentSort;
        render();
    });
});
filterInput.addEventListener("input", render);
statusFilter.addEventListener("change", render);
sortKey.addEventListener("change", () => {
    currentSort = sortKey.value;
    render();
});
render();
refreshReport();
setInterval(refreshReport, 2000);
</script>
</body>
</html>

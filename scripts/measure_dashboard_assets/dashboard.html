<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
__STYLE__
</style>
</head>
<body>
<main>
    <h1>Verify Measurement Dashboard</h1>
    <p class="lede">`oj test` を再実行しながら JSON を逐次更新し、テストごとの最遅ケースとケース別実行時間を一覧する。</p>
    <div class="meta">
        <button class="chip chip-action" id="summary-live" type="button"></button>
        <div class="chip" id="summary-generated">generated: __GENERATED_AT__</div>
        <div class="chip" id="summary-total"></div>
        <div class="chip" id="summary-progress"></div>
        <button class="chip chip-action" id="summary-failed" type="button"></button>
        <div class="chip" id="summary-visible"></div>
    </div>
    <div class="controls" id="controls">
        <label class="control-field" for="filter">
            <span class="control-label">filter</span>
            <input id="filter" type="search" placeholder="test path / url で絞り込み">
        </label>
        <label class="control-field" for="status-filter">
            <span class="control-label">status</span>
            <select id="status-filter">
                <option value="all">all</option>
                <option value="ok">ok only</option>
                <option value="failed">failed only</option>
            </select>
        </label>
        <div class="control-field mobile-only">
            <span class="control-label">sort</span>
            <div class="control-cluster">
                <select id="sort-key">
__SORT_KEY_OPTIONS__
                </select>
                <select id="sort-direction">
                    <option value="desc">desc</option>
                    <option value="asc">asc</option>
                </select>
            </div>
        </div>
        <div class="control-hint muted desktop-only">header click で sort / expander で detail 開閉</div>
    </div>
    <div class="result-meta">
        <div class="muted" id="result-count"></div>
        <div class="muted desktop-only" id="sort-summary"></div>
    </div>
    <div class="table-wrap">
        <div class="table-header-wrap desktop-only" id="table-header-wrap">
            <table class="dashboard-table dashboard-table-head">
                <thead>
                    <tr>
__SORT_HEADER_CELLS__
                    </tr>
                </thead>
            </table>
        </div>
        <div class="table-scroll" id="table-scroll">
            <table class="dashboard-table dashboard-table-body">
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>
</main>
<template id="dashboard-chip-template">
    <div class="chip"></div>
</template>
<template id="dashboard-live-chip-template">
    <span class="live-dot" aria-hidden="true"></span>
    <span class="chip-label">live</span>
    <span class="chip-meta"></span>
</template>
<template id="dashboard-empty-row-template">
    <tr>
        <td colspan="6"><div class="empty-state"></div></td>
    </tr>
</template>
<template id="dashboard-skeleton-row-template">
    <tr class="skeleton-row" aria-hidden="true">
        <td>
            <div class="skeleton-stack">
                <span class="skeleton-line"></span>
                <span class="skeleton-line mid"></span>
            </div>
        </td>
        <td><span class="skeleton-line short"></span></td>
        <td><span class="skeleton-line short"></span></td>
        <td>
            <div class="skeleton-stack">
                <span class="skeleton-line short"></span>
                <span class="skeleton-line mid"></span>
            </div>
        </td>
        <td><span class="skeleton-line short"></span></td>
        <td><span class="skeleton-line short"></span></td>
    </tr>
</template>
<template id="dashboard-row-template">
    <tr class="dashboard-row" aria-selected="false">
        <td>
            <div class="test-main">
                <div class="test-head">
                    <button class="expander" type="button" data-expand-path="" aria-expanded="false">+</button>
                    <div class="path test-path"></div>
                </div>
                <div class="test-problem"></div>
            </div>
        </td>
        <td data-label="status"><span class="status-badge"></span></td>
        <td class="num cell-compile" data-label="compile"></td>
        <td class="num" data-label="slowest">
            <div class="cell-slowest-value"></div>
            <div class="muted metric-sub cell-slowest-case"></div>
        </td>
        <td class="num cell-average" data-label="average"></td>
        <td class="num cell-memory" data-label="memory"></td>
    </tr>
</template>
<template id="detail-row-template">
    <tr class="detail-row">
        <td colspan="6">
            <div class="detail-panel">
                <div class="detail-head">
                    <div class="detail-head-main">
                        <div>
                            <div class="eyebrow">expanded test</div>
                            <h2 class="detail-title"></h2>
                            <div class="detail-problem-compact"></div>
                            <div class="detail-problem-full muted"></div>
                        </div>
                    </div>
                    <div class="detail-head-side">
                        <div class="detail-chips"></div>
                    </div>
                </div>
                <div class="detail-tabs">
                    <button class="detail-tab" type="button" data-detail-tab="case">case detail</button>
                    <button class="detail-tab" type="button" data-detail-tab="raw">raw log</button>
                </div>
                <div class="detail-content"></div>
            </div>
        </td>
    </tr>
</template>
<script>
__SCRIPT__
</script>
</body>
</html>
